<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير مهندس الموقع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--p:#1e3a5f;--a:#d97706;--bg:#f4f7fb;--card:#ffffff;--b:#dde3ec;--t:#1a2535;--m:#6b7a8d;--g:#15803d;--r:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--t);font-size:14px;}
header{background:linear-gradient(135deg,#1e3a5f,#0d2440);color:white;padding:16px 20px;display:flex;align-items:center;gap:14px;}
header .ico{font-size:28px;}
header h1{font-size:16px;font-weight:900;}
header p{font-size:11px;opacity:.6;margin-top:2px;}
.wrap{max-width:700px;margin:0 auto;padding:18px 14px 40px;}
.card{background:var(--card);border:1px solid var(--b);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.ch{background:var(--bg);padding:10px 16px;border-bottom:1px solid var(--b);font-size:13px;font-weight:700;color:var(--p);}
.cb{padding:14px 16px;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
.fg:last-child{margin-bottom:0;}
label{font-size:11px;font-weight:700;color:var(--m);}
input,select,textarea{padding:9px 12px;border:1.5px solid var(--b);border-radius:8px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--t);background:var(--bg);width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p);}
textarea{resize:vertical;min-height:65px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.hr{border:1px solid var(--b);border-radius:10px;padding:14px 12px 12px;margin-bottom:10px;background:var(--bg);position:relative;}
.hn{position:absolute;top:-10px;right:14px;background:var(--p);color:white;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;}
.db{position:absolute;top:8px;left:10px;background:var(--r);color:white;border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif;}
.add{width:100%;padding:9px;background:none;border:1.5px dashed var(--b);border-radius:8px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--m);cursor:pointer;margin-top:4px;}
.sub{width:100%;padding:14px;background:var(--p);color:white;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;margin-top:8px;}
.sub:disabled{background:var(--m);cursor:not-allowed;}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:10px;background:var(--b);border:none;padding:0;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--p);cursor:pointer;}
.pb{background:var(--b);border-radius:20px;height:7px;margin-top:4px;}
.pf{background:linear-gradient(90deg,var(--p),var(--a));height:100%;border-radius:20px;transition:width .3s;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:30px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.ts{background:var(--g);color:white;}
.te{background:var(--r);color:white;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;flex-direction:column;color:white;font-size:16px;font-weight:700;gap:14px;}
.ov.show{display:flex;}
.sp{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:500px){.g2,.g3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="ico">&#127959;</div>
  <div><h1>&#1578;&#1602;&#1585;&#1610;&#1585; &#1605;&#1607;&#1606;&#1583;&#1587; &#1575;&#1604;&#1605;&#1608;&#1602;&#1593; &#1575;&#1604;&#1610;&#1608;&#1605;&#1610;</h1><p>&#1610;&#1606;&#1581;&#1601;&#1592; &#1578;&#1604;&#1602;&#1575;&#1574;&#1610;&#1575;&#1611; &#1601;&#1610; &#1587;&#1580;&#1604; &#1575;&#1604;&#1605;&#1588;&#1585;&#1608;&#1593;</p></div>
</header>
<div class="wrap">
  <div class="card">
    <div class="ch">&#128196; &#1605;&#1593;&#1604;&#1608;&#1605;&#1575;&#1578; &#1575;&#1604;&#1578;&#1602;&#1585;&#1610;&#1585;</div>
    <div class="cb">
      <div class="g3">
        <div class="fg"><label>&#1575;&#1604;&#1578;&#1575;&#1585;&#1610;&#1582;</label><input type="date" id="d"></div>
        <div class="fg"><label>&#1575;&#1587;&#1605; &#1575;&#1604;&#1605;&#1607;&#1606;&#1583;&#1587;</label><input type="text" id="e" placeholder="م. فيصل"></div>
        <div class="fg"><label>&#1575;&#1587;&#1605; &#1575;&#1604;&#1605;&#1588;&#1585;&#1608;&#1593;</label><input type="text" id="p" placeholder="&#1605;&#1580;&#1605;&#1593; &#1575;&#1604;&#1581;&#1610;"></div></div><div class="grid3" style="margin-top:11px;"><div class="fg"><label>نوع المشروع</label>
<select id="proj-type" onchange="changeProjectType()">
<option value="بيت">مجمع سكني (بيوت)</option>
<option value="برج">عمارة / برج (طوابق)</option>
</select>
</div>
<div class="fg"><label id="blk-label">رقم البلوك</label><input type="text" id="blk" placeholder="مثال: بلوك 25"></div>
</div>
<div class="grid2" style="margin-top:11px;">
      </div>
      <div class="fg"><label>&#1581;&#1575;&#1604;&#1577; &#1575;&#1604;&#1605;&#1608;&#1602;&#1593;</label>
        <select id="ss" onchange="chSite()">
          <option value="&#1575;&#1604;&#1593;&#1605;&#1604; &#1580;&#1575;&#1585;&#1613;">&#1575;&#1604;&#1593;&#1605;&#1604; &#1580;&#1575;&#1585;&#1613;</option>
          <option value="&#1578;&#1608;&#1602;&#1601; &#1580;&#1586;&#1574;&#1610;">&#1578;&#1608;&#1602;&#1601; &#1580;&#1586;&#1574;&#1610;</option>
          <option value="&#1578;&#1608;&#1602;&#1601; &#1603;&#1575;&#1605;&#1604;">&#1578;&#1608;&#1602;&#1601; &#1603;&#1575;&#1605;&#1604;</option>
          <option value="&#1593;&#1591;&#1604;&#1577; &#1585;&#1587;&#1605;&#1610;&#1577;">&#1593;&#1591;&#1604;&#1577; &#1585;&#1587;&#1605;&#1610;&#1577;</option>
        </select>
      </div>
      <div class="fg" id="sw" style="display:none"><label>&#1587;&#1576;&#1576; &#1575;&#1604;&#1578;&#1608;&#1602;&#1601;</label><textarea id="sr"></textarea></div>
    </div>
  </div>
  <div class="card">
    <div class="ch">&#127968; &#1578;&#1601;&#1575;&#1589;&#1610;&#1604; &#1575;&#1604;&#1593;&#1605;&#1604;</div>
    <div class="cb"><div id="hl"></div><button class="add" id="ab">+ &#1573;&#1590;&#1575;&#1601;&#1577; &#1576;&#1610;&#1578;</button></div>
  </div>
  <div class="card">
    <div class="ch">&#9888;&#65039; &#1605;&#1593;&#1608;&#1602;&#1575;&#1578; &#1575;&#1604;&#1593;&#1605;&#1604;</div>
    <div class="cb"><div class="fg"><textarea id="iss" placeholder="&#1605;&#1593;&#1608;&#1602;&#1575;&#1578; &#1575;&#1604;&#1610;&#1608;&#1605;..."></textarea></div></div>
  </div>
  <div class="card">
    <div class="ch">&#128202; &#1575;&#1604;&#1573;&#1606;&#1580;&#1575;&#1586; &#1608;&#1575;&#1604;&#1582;&#1604;&#1575;&#1589;&#1577;</div>
    <div class="cb">
      <div class="fg"><label>&#1606;&#1587;&#1576;&#1577; &#1573;&#1606;&#1580;&#1575;&#1586; &#1575;&#1604;&#1605;&#1588;&#1585;&#1608;&#1593; %</label>
        <input type="range" id="rp" min="0" max="100" value="0" oninput="uProg(this.value)">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--m)"><span>0%</span><b id="pv" style="color:var(--p)">0%</b><span>100%</span></div>
        <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
      </div>
      <div class="fg" style="margin-top:10px"><label>توصيات الغد</label><textarea id="su2" placeholder="ما يجب متابعته غداً..."></textarea></div>
    </div>
  </div>
  <button class="sub" id="sb">&#128228; &#1573;&#1585;&#1587;&#1575;&#1604; &#1575;&#1604;&#1578;&#1602;&#1585;&#1610;&#1585;</button>
</div>
<div class="ov" id="ov"><div class="sp"></div><div>&#1580;&#1575;&#1585;&#1610; &#1575;&#1604;&#1573;&#1585;&#1587;&#1575;&#1604;...</div></div>
<div class="toast" id="t"></div>

<script>
var SU = 'https://script.google.com/macros/s/AKfycbyEPJhWKU0VYnTvKb7S9RgC4_xc5FRlHbfusRmnL4Mwp9kA-6JOIRr20hR2uXdC6TPp3w/exec';
var WT = ['البناء بالبلوك','الحفر والأساسات','الهيكل الإنشائي','التشطيبات الداخلية','التشطيبات الخارجية','الأعمال الكهربائية','الأعمال الميكانيكية','السقف والعزل','الأرضيات','أعمال الصبغ','الأبواب والنوافذ','أعمال أخرى'];
var hc = 0;

window.addEventListener('DOMContentLoaded', function() {
  var now = new Date();
  var dd = String(now.getDate()).padStart(2,'0');
  var mm = String(now.getMonth()+1).padStart(2,'0');
  var yyyy = now.getFullYear();
  document.getElementById('d').value = yyyy + '-' + mm + '-' + dd;
  document.getElementById('ab').addEventListener('click', function(){ addH(0); });
  document.getElementById('sb').addEventListener('click', send);
  for(var i=1;i<=7;i++) addH(i);
});

function changeProjectType(){
  var type = document.getElementById('proj-type').value;
  var blkLabel = document.getElementById('blk-label');
  var blkInput = document.getElementById('blk');
  if(type === 'برج'){
    blkLabel.textContent = 'رقم البرج / العمارة';
    blkInput.placeholder = 'مثال: برج A';
  } else {
    blkLabel.textContent = 'رقم البلوك';
    blkInput.placeholder = 'مثال: بلوك 25';
  }
  var rows = document.querySelectorAll('.hr');
  rows.forEach(function(row){
    var label = row.querySelector('.hn');
    var num = label.textContent.replace('بيت ','').replace('طابق ','');
    label.textContent = (type === 'برج' ? 'طابق ' : 'بيت ') + num;
  });
}

function chSite(){
  var v = document.getElementById('ss').value;
  document.getElementById('sw').style.display = (v==='توقف جزئي'||v==='توقف كامل') ? 'block' : 'none';
}

function addH(n){
  if(!n){ hc++; n=hc; } else if(n>hc) hc=n;
  var row = document.createElement('div');
  row.className = 'hr';

  var num = document.createElement('div');
  num.className = 'hn';
  var pt = document.getElementById('proj-type'); num.textContent = (pt && pt.value === 'برج' ? 'طابق ' : 'بيت ') + n;
  row.appendChild(num);

  var del = document.createElement('button');
  del.className = 'db';
  del.type = 'button';
  del.textContent = '✕';
  del.addEventListener('click', function(){ row.parentNode.removeChild(row); });
  row.appendChild(del);

  var inner = document.createElement('div');
  inner.style.marginTop = '12px';

  // grid3
  var g3 = document.createElement('div');
  g3.className = 'g3';

  // type
  var fg1 = document.createElement('div'); fg1.className = 'fg';
  var lb1 = document.createElement('label'); lb1.textContent = 'نوع العمل';
  var sel1 = document.createElement('select'); sel1.className = 'h-type';
  for(var i=0;i<WT.length;i++){ var o=document.createElement('option'); o.textContent=WT[i]; sel1.appendChild(o); }
  fg1.appendChild(lb1); fg1.appendChild(sel1); g3.appendChild(fg1);

  // status
  var fg2 = document.createElement('div'); fg2.className = 'fg';
  var lb2 = document.createElement('label'); lb2.textContent = 'الحالة';
  var sel2 = document.createElement('select'); sel2.className = 'h-status';
  ['جاري العمل','متوقف','مكتمل'].forEach(function(s){ var o=document.createElement('option'); o.textContent=s; o.value=s; sel2.appendChild(o); });
  
  // stop wrap
  var stopWrap = document.createElement('div'); stopWrap.className = 'fg'; stopWrap.style.display='none';
  var stopLb = document.createElement('label'); stopLb.textContent = 'سبب التوقف';
  var stopTa = document.createElement('textarea'); stopTa.className = 'h-stop'; stopTa.placeholder = 'سبب التوقف...';
  stopWrap.appendChild(stopLb); stopWrap.appendChild(stopTa);

  sel2.addEventListener('change', function(){
    stopWrap.style.display = sel2.value === 'متوقف' ? 'block' : 'none';
  });
  fg2.appendChild(lb2); fg2.appendChild(sel2); g3.appendChild(fg2);

  // prog
  var fg3 = document.createElement('div'); fg3.className = 'fg';
  var lb3 = document.createElement('label'); lb3.textContent = 'نسبة الإنجاز %';
  var inp3 = document.createElement('input'); inp3.type='text'; inp3.className='h-prog'; inp3.placeholder='مثال: 45%';
  fg3.appendChild(lb3); fg3.appendChild(inp3); g3.appendChild(fg3);
  inner.appendChild(g3);

  // contractor
  var fc = document.createElement('div'); fc.className = 'fg';
  var lc = document.createElement('label'); lc.textContent = 'اسم المقاول';
  var ic = document.createElement('input'); ic.type='text'; ic.className='h-cont'; ic.placeholder='اسم المقاول';
  fc.appendChild(lc); fc.appendChild(ic); inner.appendChild(fc);

  // desc
  var fd = document.createElement('div'); fd.className = 'fg';
  var ld = document.createElement('label'); ld.textContent = 'وصف العمل';
  var td = document.createElement('textarea'); td.className='h-desc'; td.placeholder='تفاصيل العمل...';
  fd.appendChild(ld); fd.appendChild(td); inner.appendChild(fd);

  // notes
  var fn = document.createElement('div'); fn.className = 'fg';
  var ln = document.createElement('label'); ln.textContent = 'ملاحظات تصحيحية';
  var tn = document.createElement('textarea'); tn.className='h-notes'; tn.placeholder='ملاحظات...';
  fn.appendChild(ln); fn.appendChild(tn); inner.appendChild(fn);

  // stop wrap
  inner.appendChild(stopWrap);
  row.appendChild(inner);
  document.getElementById('hl').appendChild(row);
}

function uProg(v){ document.getElementById('pv').textContent=v+'%'; document.getElementById('pb').style.width=v+'%'; }

function send(){
  var date=document.getElementById('d').value;
  var eng=document.getElementById('e').value.trim();
  var proj=document.getElementById('p').value.trim();
  if(!date||!eng||!proj){ toast('يرجى ملء التاريخ واسم المهندس والمشروع','te'); return; }

  if(!confirm('هل أنت متأكد من إرسال التقرير؟')) return;
  var rows=[];
  document.querySelectorAll('.hr').forEach(function(row){
    rows.push({
      date:date, time:new Date().toLocaleTimeString('ar-EG', {hour:'2-digit',minute:'2-digit'}), engineer:eng, project:proj, block:document.getElementById('blk').value, projType:document.getElementById('proj-type').value,
      siteStatus:document.getElementById('ss').value,
      siteStopReason:document.getElementById('sr').value,
      houseNum:row.querySelector('.hn').textContent,
      workType:row.querySelector('.h-type').value,
      status:row.querySelector('.h-status').value,
      unitProgress:row.querySelector('.h-prog').value ? row.querySelector('.h-prog').value+'%' : '',
      contractor:row.querySelector('.h-cont').value,
      desc:row.querySelector('.h-desc').value,
      notes:row.querySelector('.h-notes').value,
      houseStopReason:row.querySelector('.h-stop').value,
      issues:document.getElementById('iss').value,
      totalProgress:document.getElementById('rp').value+'%',
      summary:'', tomorrow:document.getElementById('su2').value
    });
  });
  document.getElementById('ov').classList.add('show');
  document.getElementById('sb').disabled=true;
  fetch(SU,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows:rows})})
    .then(function(){ document.getElementById('ov').classList.remove('show'); toast('تم الإرسال بنجاح','ts'); document.getElementById('sb').disabled=false; setTimeout(reset,2000); })
    .catch(function(){ document.getElementById('ov').classList.remove('show'); toast('فشل الإرسال','te'); document.getElementById('sb').disabled=false; });
}

function reset(){
  ['e','p','blk','sr','iss','su2'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('d').value=new Date().toISOString().split('T')[0];
  document.getElementById('ss').selectedIndex=0;
  document.getElementById('sw').style.display='none';
  document.getElementById('rp').value=0; uProg(0);
  document.getElementById('hl').innerHTML='';
  hc=0; for(var i=1;i<=7;i++) addH(i);
}

function toast(msg,cls){
  var t=document.getElementById('t');
  t.textContent=msg; t.className='toast '+cls+' show';
  setTimeout(function(){ t.className='toast'; },4000);
}
</script>
</body>
</html>
